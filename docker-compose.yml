services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: samsung-audit-postgres
    environment:
      POSTGRES_DB: samsung_audit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d samsung_audit"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
